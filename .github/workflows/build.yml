name: Build Base Images
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '10 4 * * *'

concurrency:
  group: "${{ github.ref }}"
  cancel-in-progress: true

env:
  DOCKER_BUILDKIT: 1
  COSIGN_EXPERIMENTAL: 1

permissions:
  contents: write
  id-token: write
  packages: write
  pull-requests: write

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frankenphp: ${{ steps.changed-files.outputs.frankenphp_any_changed }}
      fpm: ${{ steps.changed-files.outputs.fpm_any_changed }}
      should_build: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get all changed files
        id: changed-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v46
        with:
          files_yaml: |
            frankenphp:
              - docker-bake.hcl
              - .github/workflows/build.yml
              - frankenphp*/**
            fpm:
              - docker-bake.hcl
              - .github/workflows/build.yml
              - fpm*/**
              - nginx/**
              - caddy/**
              - dev/**

  frankenphp:
    name: FrankenPHP ${{ matrix.php }}
    needs: [changes]
    if: needs.changes.outputs.frankenphp == 'true' || needs.changes.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        php: [ '8-2', '8-3', '8-4', '8-5' ]
    uses: docker/github-builder/.github/workflows/bake.yml@v1
    permissions:
      contents: read
      id-token: write
    with:
      output: image
      push: true
      target: frankenphp-${{ matrix.php }}
      distribute: false
      vars: |
        imageSuffix=${{ github.event_name == 'pull_request' && '-ci-test' || '' }}
        tagPrefix=${{ github.event_name == 'pull_request' && format('{0}-', github.event.pull_request.number) || '' }}
    secrets:
      registry-auths: |
        - registry: docker.io
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  frankenphp-otel:
    name: FrankenPHP OTel ${{ matrix.php }}
    needs: [changes, frankenphp]
    if: needs.changes.outputs.frankenphp == 'true' || needs.changes.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        php: [ '8-2', '8-3', '8-4', '8-5' ]
    uses: docker/github-builder/.github/workflows/bake.yml@v1
    permissions:
      contents: read
      id-token: write
    with:
      output: image
      push: true
      target: frankenphp-otel-${{ matrix.php }}
      distribute: false
      vars: |
        imageSuffix=${{ github.event_name == 'pull_request' && '-ci-test' || '' }}
        tagPrefix=${{ github.event_name == 'pull_request' && format('{0}-', github.event.pull_request.number) || '' }}
    secrets:
      registry-auths: |
        - registry: docker.io
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  fpm:
    name: FPM ${{ matrix.php }}
    needs: [changes]
    if: needs.changes.outputs.fpm == 'true' || needs.changes.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        php: [ '8-2', '8-3', '8-4', '8-5' ]
    uses: docker/github-builder/.github/workflows/bake.yml@v1
    permissions:
      contents: read
      id-token: write
    with:
      output: image
      push: true
      target: fpm-${{ matrix.php }}
      distribute: false
      vars: |
        imageSuffix=${{ github.event_name == 'pull_request' && '-ci-test' || '' }}
        tagPrefix=${{ github.event_name == 'pull_request' && format('{0}-', github.event.pull_request.number) || '' }}
    secrets:
      registry-auths: |
        - registry: docker.io
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  fpm-otel:
    name: FPM OTel ${{ matrix.php }}
    needs: [changes, fpm]
    if: needs.changes.outputs.fpm == 'true' || needs.changes.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        php: [ '8-2', '8-3', '8-4', '8-5' ]
    uses: docker/github-builder/.github/workflows/bake.yml@v1
    permissions:
      contents: read
      id-token: write
    with:
      output: image
      push: true
      target: fpm-otel-${{ matrix.php }}
      distribute: false
      vars: |
        imageSuffix=${{ github.event_name == 'pull_request' && '-ci-test' || '' }}
        tagPrefix=${{ github.event_name == 'pull_request' && format('{0}-', github.event.pull_request.number) || '' }}
    secrets:
      registry-auths: |
        - registry: docker.io
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  webserver:
    name: ${{ matrix.webserver }} ${{ matrix.php }}
    needs: [changes, fpm]
    if: needs.changes.outputs.fpm == 'true' || needs.changes.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        webserver: [ caddy, nginx ]
        php: [ '8-2', '8-3', '8-4', '8-5' ]
    uses: docker/github-builder/.github/workflows/bake.yml@v1
    permissions:
      contents: read
      id-token: write
    with:
      output: image
      push: true
      target: ${{ matrix.webserver }}-${{ matrix.php }}
      distribute: false
      vars: |
        imageSuffix=${{ github.event_name == 'pull_request' && '-ci-test' || '' }}
        tagPrefix=${{ github.event_name == 'pull_request' && format('{0}-', github.event.pull_request.number) || '' }}
    secrets:
      registry-auths: |
        - registry: docker.io
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  webserver-otel:
    name: ${{ matrix.webserver }} OTel ${{ matrix.php }}
    needs: [changes, fpm-otel]
    if: needs.changes.outputs.fpm == 'true' || needs.changes.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        webserver: [ caddy, nginx ]
        php: [ '8-2', '8-3', '8-4', '8-5' ]
    uses: docker/github-builder/.github/workflows/bake.yml@v1
    permissions:
      contents: read
      id-token: write
    with:
      output: image
      push: true
      target: ${{ matrix.webserver }}-otel-${{ matrix.php }}
      distribute: false
      vars: |
        imageSuffix=${{ github.event_name == 'pull_request' && '-ci-test' || '' }}
        tagPrefix=${{ github.event_name == 'pull_request' && format('{0}-', github.event.pull_request.number) || '' }}
    secrets:
      registry-auths: |
        - registry: docker.io
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  dev:
    name: Dev ${{ matrix.webserver }} ${{ matrix.php }} node${{ matrix.node }}
    needs: [changes, webserver-otel]
    if: needs.changes.outputs.fpm == 'true' || needs.changes.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        webserver: [ caddy, nginx ]
        php: [ '8-2', '8-3', '8-4', '8-5' ]
        node: [ '22', '24' ]
    uses: docker/github-builder/.github/workflows/bake.yml@v1
    permissions:
      contents: read
      id-token: write
    with:
      output: image
      push: true
      target: ${{ matrix.webserver }}-dev-${{ matrix.php }}-${{ matrix.node }}
      distribute: false
      vars: |
        imageSuffix=${{ github.event_name == 'pull_request' && '-ci-test' || '' }}
        tagPrefix=${{ github.event_name == 'pull_request' && format('{0}-', github.event.pull_request.number) || '' }}
    secrets:
      registry-auths: |
        - registry: docker.io
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  dev-check:
    name: Check Dev Image
    runs-on: ubuntu-latest
    needs: [changes, dev]
    if: needs.changes.outputs.fpm == 'true' || needs.changes.outputs.should_build == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install a binary from GitHub releases
        uses: jaxxstorm/action-install-gh-release@v3.0.0
        with:
          repo: GoogleContainerTools/container-structure-test
          extension-matching: disable
          rename-to: container-structure-test
          chmod: 0755

      - name: Determine image tag
        id: image-tag
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "IMAGE_TAG=ghcr.io/shopware/docker-dev-ci-test:${{ github.event.number }}-php8.4-node24-caddy" >> $GITHUB_OUTPUT
          else
            echo "IMAGE_TAG=ghcr.io/shopware/docker-dev:php8.4-node24-caddy" >> $GITHUB_OUTPUT
          fi

      - name: Pull image
        run: docker pull ${{ steps.image-tag.outputs.IMAGE_TAG }}

      - name: Test Dev Image
        run: container-structure-test test --config dev/config.yaml --image ${{ steps.image-tag.outputs.IMAGE_TAG }}

  check:
    name: Test Image with Webserver ${{ matrix.webserver }}
    runs-on: ubuntu-latest
    needs: [changes, webserver]
    if: needs.changes.outputs.fpm == 'true' || needs.changes.outputs.should_build == 'true'
    strategy:
      matrix:
        webserver:
          - caddy
          - nginx
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout example repo
        uses: actions/checkout@v6
        with:
          repository: shopwareLabs/example-docker-repository

      - name: Build main branch
        if: github.ref == 'refs/heads/main'
        run: docker compose build --build-arg BASE_IMAGE=ghcr.io/shopware/docker-base:8.3-caddy

      - name: Build PR
        if: github.ref != 'refs/heads/main'
        run: docker compose build --build-arg BASE_IMAGE=ghcr.io/shopware/docker-base-ci-test:${{ github.event.number }}-8.3-${{ matrix.webserver}}

      - name: Run image
        run: docker compose up -d --wait

      - name: Wait for Webserver reachable
        run: |
          attempt_counter=0
          max_attempts=5

          until $(curl --output /dev/null --silent --head --fail localhost:8000/admin); do
              if [ ${attempt_counter} -eq ${max_attempts} ];then
                echo "Max attempts reached"
                exit 1
              fi

              printf '.'
              attempt_counter=$(($attempt_counter+1))
              sleep 5
          done

      - name: Check if shopware admin is running
        run: curl --fail localhost:8000/admin

      - name: Check if shopware is running
        run: curl --fail localhost:8000

      # output logs if failed
      - name: Output logs
        if: always()
        run: docker compose logs
