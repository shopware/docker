name: Cleanup GHCR
on:
  schedule:
    - cron: "0 0 * * *"

permissions:
  packages: write

jobs:
  cleanup:
    name: Cleanup GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup GHCR
        uses: dataaxiom/ghcr-cleanup-action@f092b48ba3b604b2a83690dc4b2bbb3392e1045f # ratchet:dataaxiom/ghcr-cleanup-action@v1
        with:
          packages: docker-base-ci-test,docker-dev-ci-test,demo-ci-test
          older-than: 1 day
